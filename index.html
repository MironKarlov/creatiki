<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Видео мессенджер | Чат + Звонки</title>
    <!-- PeerJS библиотека -->
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            height: calc(100vh - 40px);
        }

        /* Видео секция */
        .video-section {
            background: #0f0f1a;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .videos-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 20px;
            background: #00000022;
        }

        .video-wrapper {
            background: #1a1a2a;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            flex: 1;
            min-height: 0;
        }

        .video-wrapper.local {
            flex: 0.6;
        }

        .video-wrapper.remote {
            flex: 1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }

        .video-label {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            backdrop-filter: blur(4px);
        }

        /* Чат секция */
        .chat-section {
            background: #0f0f1a;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .chat-header {
            padding: 20px;
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a40;
        }

        .chat-header h3 {
            font-size: 18px;
        }

        .online-status {
            font-size: 12px;
            color: #4ade80;
            margin-top: 4px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            word-wrap: break-word;
        }

        .message.sent {
            background: #3b82f6;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            background: #2a2a40;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-info {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
        }

        .chat-input {
            padding: 15px;
            background: #1a1a2e;
            border-top: 1px solid #2a2a40;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 24px;
            background: #2a2a40;
            color: white;
            outline: none;
        }

        .chat-input button {
            padding: 12px 20px;
            background: #3b82f6;
            border: none;
            border-radius: 24px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .chat-input button:hover {
            background: #2563eb;
        }

        /* Панель управления */
        .control-panel {
            padding: 20px;
            background: #1a1a2e;
            display: flex;
            gap: 15px;
            justify-content: center;
            border-top: 1px solid #2a2a40;
        }

        .control-btn {
            background: #2a2a40;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .control-btn:hover {
            background: #3a3a50;
        }

        .control-btn.danger {
            background: #dc2626;
        }

        .control-btn.danger:hover {
            background: #b91c1c;
        }

        .control-btn.success {
            background: #10b981;
        }

        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e1e2f, #0f0f1a);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-card {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 32px;
            width: 350px;
            text-align: center;
        }

        .login-card input {
            width: 100%;
            padding: 14px;
            margin: 15px 0;
            border: none;
            border-radius: 30px;
            background: #2a2a40;
            color: white;
            font-size: 16px;
        }

        .login-card button {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .call-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1a1a2e;
            padding: 20px;
            border-radius: 20px;
            z-index: 200;
            box-shadow: 0 10px 30px black;
            border-left: 4px solid #3b82f6;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <h2>📹 Видео мессенджер</h2>
            <input type="text" id="myName" placeholder="Ваше имя" autocomplete="off">
            <button onclick="login()">Войти</button>
        </div>
    </div>

    <div id="mainApp" class="container hidden">
        <div class="video-section">
            <div class="videos-container">
                <div class="video-wrapper local">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div class="video-label">Вы</div>
                </div>
                <div class="video-wrapper remote">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="video-label" id="remoteLabel">Собеседник</div>
                </div>
            </div>
            <div class="control-panel">
                <button class="control-btn" id="toggleVideoBtn">🎥 Выкл видео</button>
                <button class="control-btn" id="toggleAudioBtn">🎤 Выкл микрофон</button>
                <button class="control-btn danger" id="endCallBtn" style="display:none">📞 Завершить звонок</button>
                <button class="control-btn success" id="startCallBtn">📞 Позвонить</button>
            </div>
        </div>

        <div class="chat-section">
            <div class="chat-header">
                <h3>💬 Чат</h3>
                <div class="online-status" id="peerIdDisplay"></div>
            </div>
            <div class="messages" id="messagesList"></div>
            <div class="chat-input">
                <input type="text" id="messageInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>

    <div id="callNotification" class="call-notification hidden">
        <p id="callerName">Звонок...</p>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button onclick="answerCall(true)">📹 Ответить (видео)</button>
            <button onclick="answerCall(false)">🎤 Только аудио</button>
            <button onclick="rejectCall()">❌ Отклонить</button>
        </div>
    </div>

    <script>
        // Глобальные переменные
        let peer = null;
        let myId = null;
        let myName = "";
        let currentCall = null;     // активный звонок (PeerJS connection)
        let currentStream = null;   // локальный медиапоток
        let remoteStream = null;    
        let callType = "video";     // video или audio
        let videoEnabled = true;
        let audioEnabled = true;
        let pendingCallFrom = null;  // кто звонит (peerId)
        let pendingCallType = null;

        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const messagesList = document.getElementById('messagesList');
        const peerIdDisplay = document.getElementById('peerIdDisplay');

        // Функция логина
        async function login() {
            myName = document.getElementById('myName').value.trim();
            if (!myName) {
                alert("Введите имя");
                return;
            }
            
            // Создаём Peer с случайным ID
            peer = new Peer({
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            });

            peer.on('open', (id) => {
                myId = id;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                peerIdDisplay.innerText = `Ваш ID: ${myId} | Имя: ${myName}`;
                addSystemMessage(`Ваш ID для звонков: ${myId}`);
                
                // Запрашиваем медиа (камера/микрофон)
                initMedia(true);
            });

            peer.on('call', (call) => {
                // Входящий звонок
                pendingCallFrom = call.peer;
                pendingCallType = call.metadata?.type || "video";
                
                // Получаем имя звонящего (если сохраняли ранее)
                const callerDisplay = peer._connections[call.peer]?.peer || call.peer;
                document.getElementById('callerName').innerText = `📞 Входящий звонок от ${callerDisplay} (${pendingCallType === 'video' ? 'видео' : 'аудио'})`;
                document.getElementById('callNotification').classList.remove('hidden');
                
                // Сохраняем объект звонка
                currentCall = call;
            });

            peer.on('connection', (conn) => {
                // Дата-канал для чата
                setupDataConnection(conn);
            });

            peer.on('error', (err) => {
                console.error("Peer error:", err);
                addSystemMessage("Ошибка подключения: " + err.type);
            });
        }

        // Инициализация камеры/микрофона
        async function initMedia(withVideo = true) {
            try {
                if (currentStream) {
                    currentStream.getTracks().forEach(track => track.stop());
                }
                const constraints = {
                    video: withVideo,
                    audio: true
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                currentStream = stream;
                localVideo.srcObject = stream;
                videoEnabled = withVideo;
                audioEnabled = true;
                updateButtons();
            } catch (err) {
                console.error("Media error:", err);
                addSystemMessage("Не удалось получить доступ к камере/микрофону");
                // Пробуем только аудио
                if (withVideo) {
                    initMedia(false);
                }
            }
        }

        // Начать звонок
        function startCall() {
            const targetId = prompt("Введите ID собеседника:");
            if (!targetId) return;
            
            const useVideo = confirm("Звонок с видео? (ОК - видео, Отмена - только аудио)");
            callType = useVideo ? "video" : "audio";
            
            // Переинициализируем медиа с нужным типом
            initMedia(useVideo).then(() => {
                if (!currentStream) {
                    addSystemMessage("Не удалось получить медиапоток");
                    return;
                }
                
                // Создаём звонок
                const call = peer.call(targetId, currentStream, {
                    metadata: { type: callType, fromName: myName }
                });
                
                setupCall(call, targetId);
                document.getElementById('startCallBtn').style.display = 'none';
                document.getElementById('endCallBtn').style.display = 'inline-block';
            });
        }

        // Ответ на звонок
        async function answerCall(withVideo) {
            document.getElementById('callNotification').classList.add('hidden');
            
            if (!currentCall) return;
            
            const useVideo = (withVideo && pendingCallType === 'video');
            await initMedia(useVideo);
            
            if (currentStream) {
                currentCall.answer(currentStream);
                setupCall(currentCall, pendingCallFrom);
                document.getElementById('startCallBtn').style.display = 'none';
                document.getElementById('endCallBtn').style.display = 'inline-block';
            }
            pendingCallFrom = null;
        }

        function rejectCall() {
            if (currentCall) {
                currentCall.close();
            }
            document.getElementById('callNotification').classList.add('hidden');
            currentCall = null;
            pendingCallFrom = null;
        }

        function setupCall(call, remotePeerId) {
            call.on('stream', (remoteStream) => {
                remoteVideo.srcObject = remoteStream;
                remoteStream = remoteStream;
            });
            
            call.on('close', () => {
                endCall();
            });
            
            currentCall = call;
            
            // Создаём дата-канал для чата
            const conn = peer.connect(remotePeerId);
            setupDataConnection(conn);
        }

        function setupDataConnection(conn) {
            conn.on('open', () => {
                console.log("Data connection opened");
            });
            conn.on('data', (data) => {
                const msg = JSON.parse(data);
                if (msg.type === 'chat') {
                    addMessage(msg.fromName || msg.from, msg.text, false, msg.time);
                }
            });
            // Сохраняем для отправки сообщений
            window.activeDataConn = conn;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            if (!window.activeDataConn || window.activeDataConn.open === false) {
                addSystemMessage("Нет активного соединения для чата");
                return;
            }
            
            const message = {
                type: 'chat',
                text: text,
                from: myId,
                fromName: myName,
                time: new Date().toLocaleTimeString()
            };
            window.activeDataConn.send(JSON.stringify(message));
            addMessage(myName, text, true, message.time);
            input.value = '';
        }

        function addMessage(sender, text, isSent, time) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            msgDiv.innerHTML = `<div>${text}</div><div class="message-info">${sender} • ${time || new Date().toLocaleTimeString()}</div>`;
            messagesList.appendChild(msgDiv);
            messagesList.scrollTop = messagesList.scrollHeight;
        }

        function addSystemMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.style.textAlign = 'center';
            msgDiv.style.fontSize = '12px';
            msgDiv.style.opacity = '0.7';
            msgDiv.style.padding = '5px';
            msgDiv.innerText = text;
            messagesList.appendChild(msgDiv);
            messagesList.scrollTop = messagesList.scrollHeight;
        }

        function endCall() {
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
            if (remoteStream) {
                remoteStream.getTracks().forEach(t => t.stop());
                remoteVideo.srcObject = null;
            }
            document.getElementById('startCallBtn').style.display = 'inline-block';
            document.getElementById('endCallBtn').style.display = 'none';
            addSystemMessage("Звонок завершён");
        }

        function toggleVideo() {
            if (currentStream) {
                const videoTrack = currentStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoEnabled = !videoEnabled;
                    videoTrack.enabled = videoEnabled;
                    document.getElementById('toggleVideoBtn').innerHTML = videoEnabled ? "🎥 Выкл видео" : "🎥 Вкл видео";
                }
            }
        }

        function toggleAudio() {
            if (currentStream) {
                const audioTrack = currentStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioEnabled = !audioEnabled;
                    audioTrack.enabled = audioEnabled;
                    document.getElementById('toggleAudioBtn').innerHTML = audioEnabled ? "🎤 Выкл микрофон" : "🎤 Вкл микрофон";
                }
            }
        }

        function updateButtons() {
            document.getElementById('toggleVideoBtn').innerHTML = "🎥 Выкл видео";
            document.getElementById('toggleAudioBtn').innerHTML = "🎤 Выкл микрофон";
        }

        // Привязываем кнопки
        document.getElementById('startCallBtn').onclick = startCall;
        document.getElementById('endCallBtn').onclick = endCall;
        document.getElementById('toggleVideoBtn').onclick = toggleVideo;
        document.getElementById('toggleAudioBtn').onclick = toggleAudio;
    </script>
</body>
</html>
